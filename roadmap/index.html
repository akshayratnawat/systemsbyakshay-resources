/* ══════════════════════════════════════════════════════════════
   ROW (one topic node + its subtopics)
   ══════════════════════════════════════════════════════════════ */
.row {

}

.row.right { justify-content: flex-start; padding-left: calc(50% + 32px); }

.row::before {
  content: ''; position: absolute; top: 26px;
  width: 30px; height: 3px; background: #d4d4d4;
  z-index: 0;
}
.row.left::before { right: calc(50% - 1px); }
.row.right::before { left: calc(50% - 1px); }

   ══════════════════════════════════════════════════════════════ */

.row.right .topic-group { align-items: flex-start; }

.topic-node {

.topic-node.in-progress .status-dot { background: #eab308; }

.topic-label { font-size: 14px; font-weight: 600; color: #1a1a1a; white-space: nowrap; }

.res-tag.video { background: #dbeafe; color: #1e40af; }
.res-tag.tool { background: #dcfce7; color: #166534; }

/* ══════════════════════════════════════════════════════════════
   FOOTER
   ══════════════════════════════════════════════════════════════ */

   ══════════════════════════════════════════════════════════════ */

        desc: `<strong>Open-source models trade some frontier quality for control, flexibility, and cost leverage.</strong> Families like Llama, Mistral, Qwen, and DeepSeek have made self-hosted or local deployment increasingly practical for teams that care about privacy, customization, or avoiding per-token API dependence. The ecosystem moves fast, which means the gap with top closed models is often smaller than people assume for narrow product tasks.<br><br>The operational reality is that <code>free weights does not mean free system</code>. You take on infra, scaling, quantization choices, GPU economics, and more hands-on evaluation, but in return you get real ownership over the stack.`,

  {

    topics: [
      {
        id: 'chat-completions', label: 'Chat Completions API',
        subs: ['System messages', 'Conversation turns', 'Response parsing'],
        desc: `Most teams meet LLMs through a chat endpoint, but the real skill is learning to treat it like a repeatable interface instead of a magic textbox. A solid request usually starts with a tight <strong>system message</strong>, then a controlled sequence of user and assistant turns that preserve only the context you actually need.<br><br>In production, you also care about <code>stream=true</code>, token counting, retries, and how you parse the response back into your app because the model gives you text, not guarantees. If you can reliably build, inspect, and replay chat requests, you have the core primitive behind copilots, support bots, and internal AI workflows.`,
        insight: 'If you cannot log and replay a chat request end-to-end, you are not debugging an LLM system — you are guessing.',

        subs: ['JSON mode', 'Pydantic + Instructor', 'Schema validation'],
        desc: `Free-form text is fine for demos, but production systems usually need output that fits a known shape. With <strong>structured outputs</strong>, you ask the model for JSON that matches a schema, then validate it with tools like <code>Pydantic</code> or libraries like Instructor before your app trusts it.<br><br>This reduces brittle regex parsing, makes failures explicit, and lets you recover cleanly when the model returns something incomplete. The jump from hobby project to real product often starts the moment you stop treating model output as prose and start treating it as typed data.`,
        insight: 'The fastest way to make LLM apps less flaky is to stop parsing vibes and start validating schemas.',
        resources: [
          { type: 'article', label: 'OpenAI Structured Outputs Guide', url: 'https://platform.openai.com/docs/guides/structured-outputs' },

      {
        id: 'function-calling', label: 'Function / Tool Calling',
        subs: ['Tool schemas', 'Permissions', 'Safe tool design'],
        desc: `Tool calling lets the model decide when outside action is needed instead of forcing it to hallucinate an answer from memory. You define a schema for actions like <code>search_web</code>, <code>query_orders</code>, or <code>send_email</code>, and the model returns a structured tool request rather than pretending it already did the work.<br><br>Your application then executes the tool, feeds the result back, and lets the model continue with better context. This is the backbone of modern agents, but the engineering work is less about clever prompting and more about permissions, validation, and safe tool design.`,
        insight: 'Agents become useful when tools are narrow, typed, and permissioned — not when the prompt sounds more autonomous.',

        subs: ['Temperature', 'Top-p / Top-k', 'Penalties'],
        desc: `Sampling settings control how adventurous or conservative the model is when choosing the next token. Parameters like <code>temperature</code>, <code>top_p</code>, and penalties change whether the model sticks to the most likely answer or explores more unusual continuations.<br><br>For creative writing, variety can help; for extraction, classification, and tool use, randomness usually hurts more than it helps. That is why many production systems pin <code>temperature=0</code> and only loosen it when they have a measured reason to do so.`,
        insight: 'Change sampling only when you can name the failure mode you are fixing; otherwise leave it boring and deterministic.',

        desc: `Streaming sends tokens as they are generated instead of waiting for the full answer to finish. That usually means a user sees useful output in under a second, even when total completion time is still several seconds.<br><br>Under the hood, this is often handled with <strong>server-sent events</strong> and chunked updates that your frontend assembles into a live response. Good streaming UX also means handling partial text, cancellations, and tool events cleanly instead of assuming the model replies in one neat block.`,
        insight: 'Users judge speed by time-to-first-token more than time-to-last-token, so streaming is a product feature, not just an API feature.',

  {
    id: 's5', label: 'AI Safety & Ethics', time: 'Non-negotiable', cls: 'p4',
    topics: [
      {
        id: 'prompt-injection', label: 'Prompt Injection Attacks',
        subs: ['Instruction override', 'Data exfiltration', 'Indirect injection'],
        desc: `Prompt injection happens when untrusted content tells the model to ignore its original instructions or reveal data it should never expose. The uncomfortable truth is that models do not reliably separate developer intent from user-supplied text, especially when both arrive in the same context window.<br><br>That means you cannot solve this with a clever prompt alone; you need <strong>least-privilege tools</strong>, strict output validation, and isolation between trusted instructions and untrusted content. Treat every retrieved document, web page, and user message as potentially adversarial.`,

      {
        id: 'bias-fairness', label: 'Bias & Fairness',
        subs: ['Demographic testing', 'Output auditing', 'Legal exposure'],
        desc: `Models learn patterns from human-generated data, which means they also absorb distortions, stereotypes, and historical imbalances. In practice, fairness work means testing outputs across demographic groups, tracking where performance degrades, and auditing real usage instead of assuming benchmark scores tell the whole story.<br><br>This is not just an abstract ethics topic; biased systems damage trust, create legal exposure, and quietly fail the people who most need them to work. If your app makes decisions or recommendations, fairness has to be an engineering routine, not a press-release value.`,
        insight: 'You do not discover bias by believing your intentions are good — you discover it by measuring behavior across groups.',

    topics: [
      {
        id: 'embedding-models', label: 'Embedding Models',
        subs: ['OpenAI', 'Cohere', 'Sentence Transformers'],
        desc: `Embedding models turn text into vectors so your system can compare meaning instead of just matching exact words. You will see hosted options like OpenAI and Cohere, plus open-source choices such as <strong>Sentence Transformers</strong> and <strong>BGE</strong> that give you more control over hosting and tuning.<br><br>In real projects, model choice matters less than people think at the start; chunking quality, metadata, and evaluation usually dominate early results. Start with a cheap, solid default and only upgrade when your retrieval evals prove embeddings are the bottleneck.`,

        subs: ['Approximate nearest neighbor', 'Hybrid search', 'Filtering'],
        desc: `Similarity search takes a query, converts it into an embedding, and finds the nearest stored vectors based on a distance metric such as cosine similarity. Exact search is simple but expensive at scale, so most real systems use approximate nearest neighbor indexes that trade a tiny amount of recall for a massive speedup.<br><br>The best systems also combine vector search with filters and keyword signals, because meaning alone is not always enough. Hybrid search is often what turns "kind of relevant" results into "actually useful" results.`,

    topics: [
      {

        subs: ['Support bots', 'Knowledge search', 'Document Q&A'],
        desc: `Retrieval-augmented generation is the pattern I reach for when the answer already exists somewhere in the business, but nobody can reliably find it fast. Instead of stuffing knowledge into the model once, you fetch the right evidence at request time and let the model synthesize it.<br><br>That makes RAG a strong fit for customer support bots, internal knowledge search, document Q&A, legal research, and code documentation assistants. <strong>In production, RAG is the workhorse</strong> because it handles changing information, private data, and source citations without retraining a model every week.`,

        subs: ['Dynamic data', 'Behavior tuning', 'Cost tradeoffs'],
        desc: `Use <code>RAG</code> when the hard problem is knowledge access: fresh documents, private files, changing policies, or anything users will ask about tomorrow that did not exist today. Use fine-tuning when the hard problem is consistent behavior: output style, tool selection habits, domain-specific formatting, or a repeatable voice.<br><br>RAG is usually cheaper, faster to iterate, and easier to debug because you can inspect what was retrieved. Fine-tuning is more permanent, slower to update, and easy to misuse when the real issue is bad retrieval or weak prompts.`,

/* ══════════════════════════════════════════════════════════════
   RENDER ENGINE
   ══════════════════════════════════════════════════════════════ */
const roadmapEl = document.getElementById('roadmap');
let allTopicIds = [];

function render() {
  roadmapEl.innerHTML = '';
  let side = 'right';

  PHASES.forEach(phase => {
    // Phase header
    const phHeader = document.createElement('div');
    phHeader.className = 'phase-header';
    phHeader.innerHTML = `<div class="phase-pill ${phase.cls}">${phase.label}<span class="phase-time">${phase.time}</span></div>`;
    roadmapEl.appendChild(phHeader);

    phase.topics.forEach(topic => {
      allTopicIds.push(topic.id);
      const status = getStatus(topic.id);
      const row = document.createElement('div');
      row.className = `row ${side}`;
      row.innerHTML = `
        <div class="topic-group">
          <div class="topic-node ${status}" onclick="openDetail('${topic.id}')" data-id="${topic.id}">
            <div class="status-dot"></div>
            <div class="topic-label">${topic.label}</div>
          </div>
          ${topic.subs && topic.subs.length ? `<div class="subtopics">${topic.subs.map(s => `<div class="sub-chip">${s}</div>`).join('')}</div>` : ''}
        </div>
      `;
      roadmapEl.appendChild(row);
      side = side === 'right' ? 'left' : 'right';
    });
  });

  updateProgress();
}

/* ══════════════════════════════════════════════════════════════
   PROGRESS (localStorage)
   ══════════════════════════════════════════════════════════════ */
function getStatus(id) {
  return localStorage.getItem('rm_' + id) || '';
}
function setStatus(id, status) {
  if (status) localStorage.setItem('rm_' + id, status);
  else localStorage.removeItem('rm_' + id);
}
function updateProgress() {
  const done = allTopicIds.filter(id => getStatus(id) === 'done').length;
  const total = allTopicIds.length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} Done`;

  // Update node classes
  document.querySelectorAll('.topic-node').forEach(node => {
    const id = node.dataset.id;
    node.className = 'topic-node ' + getStatus(id);
  });
}
function resetProgress() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  allTopicIds.forEach(id => localStorage.removeItem('rm_' + id));
  updateProgress();
}

/* ══════════════════════════════════════════════════════════════
   DETAIL PANEL
   ══════════════════════════════════════════════════════════════ */
function findTopic(id) {
  for (const phase of PHASES) {
    for (const t of phase.topics) {
      if (t.id === id) return { topic: t, phase };
    }
  }
  return null;
}

function openDetail(id) {
  const found = findTopic(id);
  if (!found) return;
  const { topic, phase } = found;
  const status = getStatus(id);

  let html = `
    <div class="detail-phase-tag ${phase.cls}">${phase.label}</div>
    <h2 class="detail-title">${topic.label}</h2>
    <div class="detail-status-row">
      <button class="status-btn ${status === 'done' ? 'active-done' : ''}" onclick="toggleStatus('${id}','done')">✓ Done</button>
      <button class="status-btn ${status === 'in-progress' ? 'active-progress' : ''}" onclick="toggleStatus('${id}','in-progress')">◐ In Progress</button>
      <button class="status-btn ${status === 'skip' ? 'active-skip' : ''}" onclick="toggleStatus('${id}','skip')">⊘ Skip</button>
    </div>
    <div class="detail-desc">${topic.desc}</div>
  `;

  if (topic.insight) {
    html += `<div class="key-insight">💡 <strong>Key insight:</strong> ${topic.insight}</div>`;
  }

  if (topic.resources && topic.resources.length) {
    html += `<div class="detail-section-title">Resources</div>`;
    topic.resources.forEach(r => {
      html += `<div class="resource-item"><span class="res-tag ${r.type}">${r.type}</span><a href="${r.url}" target="_blank" rel="noopener">${r.label}</a></div>`;
    });
  }

  document.getElementById('detailInner').innerHTML = html;
  document.getElementById('overlayBg').classList.add('open');
  document.getElementById('detailModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('overlayBg').classList.remove('open');
  document.getElementById('detailModal').classList.remove('open');
  document.body.style.overflow = '';
}

function toggleStatus(id, newStatus) {
  const current = getStatus(id);
  if (current === newStatus) setStatus(id, '');
  else setStatus(id, newStatus);
  updateProgress();
  openDetail(id); // refresh panel
}

// Close on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// Init
render();
</script>
